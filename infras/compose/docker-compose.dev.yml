x-healthcheck-defaults: &healthcheck_base
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 10s

x-postgres-env: &postgres-env
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  POSTGRES_DB: ${POSTGRES_DB}

x-minio-env: &minio-env
  S3_ENDPOINT: ${S3_ENDPOINT}
  MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
  MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
  UPLOAD_BUCKET: ${UPLOAD_BUCKET}
  OLIST_DATA: ${OLIST_DATA}

services:
  postgres:
    image: postgres:${POSTGRES_VERSION}
    container_name: mads-postgres
    environment:
      <<: *postgres-env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      <<: *healthcheck_base
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]

  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      <<: *minio-env
    volumes:
      - minio_data:/data
    healthcheck:
      <<: *healthcheck_base
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]

  ingestion:
    build:
      context: ../../
      dockerfile: infras/docker/Dockerfile.ingestion
    command: python data/ingestion.py
    env_file:
      - ../../.env.dev
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  api:
    build:
      context: ../../
      dockerfile: infras/docker/Dockerfile.api
    command: >
      uvicorn api.main:app
      --host 0.0.0.0
      --port 8000
      --reload
    env_file:
      - ../../.env.dev
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      ingestion:
        condition: service_completed_successfully 
      redis:
        condition: service_healthy

    ports:
      - "8000:8000"
    volumes:
      - ../../backend:/app/backend
      - shared_tmp:/tmp/uploads
    
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      <<: *healthcheck_base 
      test: ["CMD", "redis-cli", "ping"]
  
  celery_worker:
    build: 
      context: ../../
      dockerfile: infras/docker/Dockerfile.api
    command: celery -A core.worker worker --loglevel=debug
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - ../../.env.dev
    volumes:
      - ../../backend:/app/backend 
      - shared_tmp:/tmp/uploads

volumes:
  pgdata:
  minio_data:
  backend:
  redis_data:
  shared_tmp: